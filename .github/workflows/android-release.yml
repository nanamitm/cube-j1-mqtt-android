name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  QT_VERSION: '6.11.1'
  NDK_VERSION: 'r27c'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install host Qt (Linux desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          dir: '${{ github.workspace }}/qt-host'
          set-env: false

      - name: Install Qt for Android (arm64-v8a)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          dir: '${{ github.workspace }}/qt-android'
          set-env: false

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Resolve toolchain paths
        run: |
          echo "QT_HOST_PATH=${{ github.workspace }}/qt-host/Qt/${{ env.QT_VERSION }}/gcc_64" >> "$GITHUB_ENV"
          echo "QT_ANDROID_PATH=${{ github.workspace }}/qt-android/Qt/${{ env.QT_VERSION }}/android_arm64_v8a" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_ENV"

      - name: Install required Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build-android-release -G Ninja -Wno-dev \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ANDROID_PATH/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=latest \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -DCMAKE_MAKE_PROGRAM=ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build signed release APK
        env:
          ANDROID_storeFile: '${{ github.workspace }}/release.jks'
          ANDROID_storePassword: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          ANDROID_keyAlias: ${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          ANDROID_keyPassword: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
        run: cmake --build build-android-release --target apk

      - name: Locate and rename APK
        run: |
          apk=$(find build-android-release -name '*-release.apk' -path '*/outputs/apk/release/*' | head -n1)
          if [ -z "$apk" ]; then
            echo "No release APK found"
            find build-android-release -name '*.apk'
            exit 1
          fi
          mkdir -p dist
          cp "$apk" "dist/CubeJ1MqttAndroid-${{ github.ref_name }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubeJ1MqttAndroid-release
          path: dist/*.apk

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
